<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsip Digital KPU - Flipbook Viewer</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- PDF.js untuk membaca file PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <!-- StPageFlip untuk efek melipat kertas -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    
    <style>
        body {
            /* Latar belakang terang dengan gradien halus ala meja kaca/putih */
            background: radial-gradient(circle at 50% 50%, #ffffff 0%, #e0e0e0 100%);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        /* NAVBAR / HEADER MINIMALIS */
        header {
            background: transparent;
        }

        .icon-btn {
            color: #888;
            transition: color 0.2s;
            cursor: pointer;
        }
        .icon-btn:hover {
            color: #333;
        }

        #book-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 70px);
            width: 100%;
            overflow: hidden; 
        }

        /* * EFEK BUKU FISIK (HARDCOVER) 
         */
        #book-cover {
            position: relative;
            background-color: #d4d4d4; /* Warna kulit sampul luar */
            padding: 10px; /* Sampul lebih besar 10px dari kertas */
            border-radius: 6px;
            /* Bayangan jatuh buku ke meja */
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.4),
                inset 0 0 8px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            display: flex;
        }

        /* Efek Ketebalan Tumpukan Kertas di Sisi Kiri dan Kanan */
        #book-cover::before, #book-cover::after {
            content: '';
            position: absolute;
            top: 10px; bottom: 10px;
            width: 10px;
            background: #fff;
            z-index: 0;
        }
        #book-cover::before {
            left: 2px;
            /* Garis-garis tipis meniru tumpukan kertas */
            box-shadow: inset -1px 0 0 #ddd, inset -2px 0 0 #fff, inset -3px 0 0 #ddd, inset -4px 0 0 #fff;
            border-radius: 4px 0 0 4px;
        }
        #book-cover::after {
            right: 2px;
            /* Garis-garis tipis meniru tumpukan kertas */
            box-shadow: inset 1px 0 0 #ddd, inset 2px 0 0 #fff, inset 3px 0 0 #ddd, inset 4px 0 0 #fff;
            border-radius: 0 4px 4px 0;
        }

        /* Bayangan Lipatan Tengah (Gutter Spine) */
        #spine-shadow {
            position: absolute;
            top: 10px; bottom: 10px;
            left: 50%;
            width: 50px;
            transform: translateX(-50%);
            /* Gradien gelap di tengah, memudar ke kiri dan kanan */
            background: linear-gradient(to right, 
                rgba(255,255,255,0) 0%, 
                rgba(0,0,0,0.05) 20%, 
                rgba(0,0,0,0.4) 48%, 
                rgba(0,0,0,0.6) 50%, 
                rgba(0,0,0,0.4) 52%, 
                rgba(0,0,0,0.05) 80%, 
                rgba(255,255,255,0) 100%);
            z-index: 10;
            pointer-events: none; /* Klik tembus ke kertas di bawahnya */
        }

        /* Jika layar sempit (1 halaman), sembunyikan efek spine & stack kiri */
        .portrait-mode #spine-shadow { display: none; }
        .portrait-mode::before { display: none; }

        /* Container halaman */
        #book {
            z-index: 1;
            background-color: #fff;
        }

        /* Kertas individu */
        .page {
            background-color: #fdfdfd;
            border: 1px solid #e0e0e0;
            overflow: hidden;
        }

        .page canvas {
            width: 100%;
            height: 100%;
            object-fit: contain; 
        }

        /* Loading Screen */
        #loader {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(245, 245, 245, 0.95);
            z-index: 50;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .spinner {
            border: 4px solid #e5e7eb; 
            border-top: 4px solid #888; 
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- Header Minimalis ala Gambar Referensi -->
    <header class="w-full z-20 p-4 flex justify-between items-center h-[70px]">
        <div class="flex items-center gap-3">
            <h1 class="text-md font-semibold text-gray-600 tracking-wide">Arsip Digital KPU Provinsi Sulawesi Tengah</h1>
        </div>

        <div class="flex items-center gap-4">
            <span id="page-counter" class="text-gray-500 font-medium text-sm">Memuat...</span>
            <div class="flex gap-2">
                <!-- Tombol navigasi dibuat putih bersih -->
                <button id="prev-btn" class="bg-white hover:bg-gray-50 text-gray-600 border border-gray-300 px-4 py-2 rounded font-medium transition-colors disabled:opacity-50 shadow-sm">←</button>
                <button id="next-btn" class="bg-white hover:bg-gray-50 text-gray-600 border border-gray-300 px-4 py-2 rounded font-medium transition-colors disabled:opacity-50 shadow-sm">→</button>
            </div>
        </div>
    </header>

    <main class="flex-1 relative">
        
        <div id="loader">
            <div class="spinner mb-4"></div>
            <p class="text-xl font-bold text-gray-600" id="loading-text">Menyiapkan Dokumen KPU...</p>
        </div>

        <div id="book-wrapper">
            <!-- Penambahan elemen "Cover" dan "Spine Shadow" untuk efek nyata -->
            <div id="book-cover">
                <div id="spine-shadow"></div>
                <div id="book"></div>
            </div>
        </div>
    </main>

    <script>
        // ==========================================
        // 1. SETTING: NAMA FILE PDF ANDA DI GITHUB
        // ==========================================
        const PDF_URL = './e-magazine.pdf'; 
        
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let pageFlipInstance = null;
        let totalPages = 0;
        let reqWidth = 0;
        let reqHeight = 0;

        const loader = document.getElementById('loader');
        const bookCover = document.getElementById('book-cover');
        const bookEl = document.getElementById('book');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const loadingText = document.getElementById('loading-text');
        const pageCounter = document.getElementById('page-counter');

        window.onload = function() {
            loadAndRenderPDF(PDF_URL);
        };

        async function loadAndRenderPDF(url) {
            try {
                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;
                totalPages = pdf.numPages;
                
                const firstPage = await pdf.getPage(1);
                // Kita kurangi sedikit skalanya agar muat dengan cover yang ditambahkan
                const baseViewport = firstPage.getViewport({ scale: 1.4 }); 
                
                reqWidth = baseViewport.width;
                reqHeight = baseViewport.height;

                for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                    loadingText.innerText = `Memproses halaman ${pageNum} dari ${totalPages}...`;
                    
                    const page = await pdf.getPage(pageNum);
                    const viewport = page.getViewport({ scale: 1.4 });
                    
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;

                    await page.render({
                        canvasContext: ctx,
                        viewport: viewport
                    }).promise;

                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page';
                    pageDiv.appendChild(canvas);
                    
                    bookEl.appendChild(pageDiv);
                }

                loadingText.innerText = "Membentuk buku 3D...";
                
                const isMobileScreen = window.innerWidth <= 768;

                pageFlipInstance = new window.St.PageFlip(bookEl, {
                    width: reqWidth,       
                    height: reqHeight,     
                    size: "fixed",         
                    showCover: true,       
                    mobileScrollSupport: true,
                    usePortrait: isMobileScreen 
                });

                pageFlipInstance.loadFromHTML(document.querySelectorAll('.page'));

                loader.style.display = 'none';
                updateCounter(0);
                scaleBook();

                pageFlipInstance.on('flip', (e) => {
                    updateCounter(e.data);
                });
                
                pageFlipInstance.on('changeOrientation', () => {
                    scaleBook();
                    updateCounter(pageFlipInstance.getCurrentPageIndex());
                });

            } catch (error) {
                console.error("Error rendering PDF: ", error);
                loadingText.innerText = "Gagal memuat dokumen!";
                document.querySelector('.spinner').style.display = 'none';
                
                const errorMsg = document.createElement('p');
                errorMsg.className = 'text-red-500 text-sm mt-4 text-center max-w-md';
                errorMsg.innerText = `Pastikan file "${url}" ada di repository. Detail Error: ${error.message}`;
                loader.appendChild(errorMsg);
            }
        }

        // ==============================================================
        // FUNGSI UNTUK MENGHITUNG TEKS HALAMAN SECARA AKURAT
        // ==============================================================
        function updateCounter(pageIndex) {
            if (!pageFlipInstance) return;
            
            const isPortrait = pageFlipInstance.getOrientation() === 'portrait';
            let pageNum = pageIndex + 1;

            if (isPortrait) {
                pageCounter.innerText = `Halaman ${pageNum} dari ${totalPages}`;
            } else {
                if (pageNum === 1) {
                    pageCounter.innerText = `Halaman 1 dari ${totalPages}`;
                } else {
                    let endPage = pageNum + 1;
                    if (endPage > totalPages) {
                        pageCounter.innerText = `Halaman ${pageNum} dari ${totalPages}`;
                    } else {
                        pageCounter.innerText = `${pageNum} - ${endPage}`;
                    }
                }
            }
        }

        // ==============================================================
        // FUNGSI UNTUK MENYESUAIKAN BUKU & COVER DENGAN LAYAR
        // ==============================================================
        function scaleBook() {
            if (!pageFlipInstance) return;
            
            const wrapper = document.getElementById('book-wrapper');
            const isPortrait = pageFlipInstance.getOrientation() === 'portrait';
            
            // Tambah/hapus class portrait untuk mengatur bayangan tengah
            if(isPortrait) {
                bookCover.classList.add('portrait-mode');
            } else {
                bookCover.classList.remove('portrait-mode');
            }

            // Lebar buku asli + padding cover (20px)
            const currentBookWidth = (isPortrait ? reqWidth : reqWidth * 2) + 20;
            const currentBookHeight = reqHeight + 20;
            
            const availableWidth = wrapper.clientWidth - 40;
            const availableHeight = wrapper.clientHeight - 40;
            
            const scaleWidth = availableWidth / currentBookWidth;
            const scaleHeight = availableHeight / currentBookHeight;
            
            const scale = Math.min(scaleWidth, scaleHeight, 1); 
            
            // Terapkan Zoom ke SELURUH Cover (bukan cuma kertasnya)
            bookCover.style.transform = `scale(${scale})`;
            bookCover.style.transformOrigin = 'center center';
        }

        window.addEventListener('resize', scaleBook);

        // Kontrol Tombol
        prevBtn.addEventListener('click', () => {
            if(pageFlipInstance) pageFlipInstance.flipPrev();
        });
        
        nextBtn.addEventListener('click', () => {
            if(pageFlipInstance) pageFlipInstance.flipNext();
        });

        document.addEventListener('keydown', (e) => {
            if (!pageFlipInstance) return;
            if (e.keyCode === 37) pageFlipInstance.flipPrev(); 
            if (e.keyCode === 39) pageFlipInstance.flipNext(); 
        });

    </script>
</body>
</html>
