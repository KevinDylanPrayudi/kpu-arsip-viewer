<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsip Digital KPU - Flipbook Viewer</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- jQuery (Required for Turn.js) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- Turn.js for the flip effect -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    
    <!-- PDF.js for rendering PDF files -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    
    <style>
        body {
            background-color: #e5e7eb; /* gray-200 */
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        #book-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 70px); /* Adjust based on header height */
            width: 100%;
            overflow: hidden;
            perspective: 2000px;
        }

        #flipbook {
            transition: transform 0.3s ease;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        #flipbook .page {
            background-color: white;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        #flipbook canvas {
            width: 100%;
            height: 100%;
            object-fit: fill; /* Ensures canvas completely fills the A4 page div */
        }

        /* Loading overlay */
        #loader {
            position: fixed;
            top: 70px; left: 0; right: 0; bottom: 0;
            background: rgba(229, 231, 235, 0.95);
            z-index: 50;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .spinner {
            border: 4px solid #d1d5db;
            border-top: 4px solid #ea580c; /* Orange KPU accent */
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- Header -->
    <header class="bg-white shadow z-10 p-4 flex justify-between items-center h-[70px] border-b-4 border-orange-600">
        <div class="flex items-center gap-3">
            <h1 class="text-xl font-bold text-gray-800">Arsip Digital KPU Provinsi Sulawesi Tengah</h1>
        </div>
        
        <div class="flex gap-2">
            <span id="page-counter" class="text-gray-500 font-medium px-4 py-2">Loading...</span>
            <button id="prev-btn" class="bg-gray-100 hover:bg-gray-200 text-gray-800 border border-gray-300 px-4 py-2 rounded-md font-medium transition-colors disabled:opacity-50">← Sebelumnya</button>
            <button id="next-btn" class="bg-gray-100 hover:bg-gray-200 text-gray-800 border border-gray-300 px-4 py-2 rounded-md font-medium transition-colors disabled:opacity-50">Selanjutnya →</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 relative bg-gray-200">
        
        <!-- Loading State -->
        <div id="loader">
            <div class="spinner mb-4"></div>
            <p class="text-xl font-bold text-gray-800" id="loading-text">Menyiapkan Dokumen...</p>
            <p class="text-sm text-gray-600 mt-2">Memuat halaman dengan resolusi tinggi (A4)</p>
        </div>

        <div id="book-wrapper">
            <div id="flipbook" style="display: none;"></div>
        </div>
    </main>

    <script>
        // ==========================================
        // 1. SETTING: MASUKKAN NAMA FILE PDF ANDA DI SINI
        // ==========================================
        const PDF_URL = './e-magazine.pdf'; // Ganti dengan nama file PDF yang ada di repository Anda
        
        // A4 Aspect Ratio Settings (High Resolution for sharp text)
        // 1 : 1.414 aspect ratio
        const A4_WIDTH = 900; 
        const A4_HEIGHT = 1273; // 900 * 1.414
        const BOOK_WIDTH = A4_WIDTH * 2; // Two pages side by side

        // PDF.js Worker setup
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let flipbookInitialized = false;
        let totalPages = 0;

        const loader = document.getElementById('loader');
        const flipbookEl = $('#flipbook');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const loadingText = document.getElementById('loading-text');
        const pageCounter = document.getElementById('page-counter');

        // Initial Load
        window.onload = function() {
            loadAndRenderPDF(PDF_URL);
        };

        // Navigation Bindings
        prevBtn.addEventListener('click', () => flipbookEl.turn('previous'));
        nextBtn.addEventListener('click', () => flipbookEl.turn('next'));

        $(window).on('keydown', function(e) {
            if (e.keyCode === 37) flipbookEl.turn('previous'); 
            if (e.keyCode === 39) flipbookEl.turn('next');     
        });

        async function loadAndRenderPDF(url) {
            try {
                // Fetch PDF from the URL
                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;
                totalPages = pdf.numPages;
                
                // Set initial size of the flipbook container
                flipbookEl.css({ width: BOOK_WIDTH, height: A4_HEIGHT });
                flipbookEl.show();

                // Render each page
                for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                    loadingText.innerText = `Memproses halaman ${pageNum} dari ${totalPages}...`;
                    
                    const page = await pdf.getPage(pageNum);
                    
                    // Calculate scale to force A4 width
                    const unscaledViewport = page.getViewport({ scale: 1.0 });
                    const scale = A4_WIDTH / unscaledViewport.width;
                    const viewport = page.getViewport({ scale: scale });
                    
                    // Create Canvas
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Set canvas resolution to strictly A4 dimensions
                    canvas.width = A4_WIDTH;
                    canvas.height = A4_HEIGHT;

                    // Render PDF page into canvas context
                    const renderContext = {
                        canvasContext: ctx,
                        viewport: viewport
                    };
                    await page.render(renderContext).promise;

                    // Wrap canvas in a turn.js page div
                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page';
                    pageDiv.appendChild(canvas);
                    
                    flipbookEl.append(pageDiv);
                }

                // Initialize Turn.js Book
                loadingText.innerText = "Menyelesaikan buku...";
                setTimeout(() => {
                    flipbookEl.turn({
                        width: BOOK_WIDTH,
                        height: A4_HEIGHT,
                        autoCenter: true,
                        duration: 800,
                        gradients: true,
                        elevation: 50,
                        when: {
                            turning: function(e, page, view) {
                                updatePageCounter(page);
                            }
                        }
                    });
                    
                    flipbookInitialized = true;
                    loader.style.display = 'none';
                    updatePageCounter(1);
                    scaleBook(); 
                }, 200);

            } catch (error) {
                console.error("Error rendering PDF: ", error);
                loadingText.innerText = "Error memuat dokumen!";
                document.querySelector('.spinner').style.display = 'none';
                
                // Detailed error for debugging
                const errorMsg = document.createElement('p');
                errorMsg.className = 'text-red-500 text-sm mt-4 text-center max-w-md';
                errorMsg.innerText = `Pastikan file "${url}" ada di dalam repository yang sama. Detail Error: ${error.message}`;
                loader.appendChild(errorMsg);
            }
        }

        function updatePageCounter(currentPage) {
            // Turn.js view returns an array of visible pages e.g. [1, 2] or [0, 1]
            let view = flipbookEl.turn('view');
            let text = "";
            if (view[0] === 0) text = `Halaman ${view[1]} dari ${totalPages}`; // Cover page
            else if (view[1] === 0) text = `Halaman ${view[0]} dari ${totalPages}`; // Back cover
            else text = `Halaman ${view[0]}-${view[1]} dari ${totalPages}`; // Middle pages
            
            pageCounter.innerText = text;
        }

        // Responsive Scaling to fit any monitor
        function scaleBook() {
            if (!flipbookInitialized) return;
            
            const wrapper = document.getElementById('book-wrapper');
            
            // Calculate available space minus some padding (40px)
            const availableWidth = wrapper.clientWidth - 40;
            const availableHeight = wrapper.clientHeight - 40;
            
            const scaleWidth = availableWidth / BOOK_WIDTH;
            const scaleHeight = availableHeight / A4_HEIGHT;
            
            // Choose the smallest scale to ensure the whole book fits on screen
            const scale = Math.min(scaleWidth, scaleHeight, 1); 
            
            flipbookEl.css('transform', `scale(${scale})`);
            flipbookEl.css('transform-origin', 'center center');
        }

        $(window).resize(scaleBook);

    </script>
</body>
</html>
