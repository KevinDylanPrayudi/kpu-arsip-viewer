<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsip Digital KPU - Flipbook Viewer</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- PDF.js untuk membaca file PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <!-- StPageFlip untuk efek melipat kertas -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    
    <style>
        body {
            background-color: #2d2d2d;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        #book-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 70px);
            width: 100%;
        }

        #book {
            transition: transform 0.3s ease; /* Transisi mulus saat layar dibesar/kecilkan */
        }

        .page {
            background-color: #ffffff;
            box-shadow: inset -1px 0 5px rgba(0,0,0,0.05), inset 1px 0 5px rgba(0,0,0,0.05); 
            border: 1px solid #e5e7eb;
            overflow: hidden;
        }

        .page canvas {
            width: 100%;
            height: 100%;
            /* KUNCI ANTI-TERPOTONG: Memastikan seluruh isi PDF muat di dalam elemen */
            object-fit: contain; 
        }

        .stf__block {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border-radius: 2px;
        }

        #loader {
            position: fixed;
            top: 70px; left: 0; right: 0; bottom: 0;
            background: rgba(45, 45, 45, 0.95);
            z-index: 50;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .spinner {
            border: 4px solid #4b5563; 
            border-top: 4px solid #f97316; 
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="bg-[#1a1a1a] shadow-lg z-10 p-4 flex justify-between items-center h-[70px] border-b border-gray-800">
        <div class="flex items-center gap-3">
            <h1 class="text-lg font-bold text-gray-100 tracking-wide">Arsip Digital KPU Provinsi Sulawesi Tengah</h1>
        </div>
        
        <div class="flex items-center gap-4">
            <span id="page-counter" class="text-gray-400 font-medium text-sm">Memuat...</span>
            <div class="flex gap-2">
                <button id="prev-btn" class="bg-gray-800 hover:bg-gray-700 text-white border border-gray-600 px-4 py-2 rounded font-medium transition-colors disabled:opacity-50 shadow-sm">← Sebelumnya</button>
                <button id="next-btn" class="bg-gray-800 hover:bg-gray-700 text-white border border-gray-600 px-4 py-2 rounded font-medium transition-colors disabled:opacity-50 shadow-sm">Selanjutnya →</button>
            </div>
        </div>
    </header>

    <main class="flex-1 relative bg-[#2d2d2d] bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">
        
        <div id="loader">
            <div class="spinner mb-4"></div>
            <p class="text-xl font-bold text-gray-100" id="loading-text">Menyiapkan Dokumen KPU...</p>
            <p class="text-sm text-gray-400 mt-2">Menyesuaikan resolusi agar tidak terpotong</p>
        </div>

        <div id="book-wrapper">
            <div id="book"></div>
        </div>
    </main>

    <script>
        // ==========================================
        // 1. SETTING: NAMA FILE PDF ANDA DI GITHUB
        // ==========================================
        const PDF_URL = './e-magazine.pdf'; 
        
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let pageFlipInstance = null;
        let totalPages = 0;
        let reqWidth = 0;
        let reqHeight = 0;

        const loader = document.getElementById('loader');
        const bookEl = document.getElementById('book');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const loadingText = document.getElementById('loading-text');
        const pageCounter = document.getElementById('page-counter');

        window.onload = function() {
            loadAndRenderPDF(PDF_URL);
        };

        async function loadAndRenderPDF(url) {
            try {
                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;
                totalPages = pdf.numPages;
                
                // Ambil ukuran patokan dari Halaman 1
                const firstPage = await pdf.getPage(1);
                const baseViewport = firstPage.getViewport({ scale: 1.5 }); 
                
                reqWidth = baseViewport.width;
                reqHeight = baseViewport.height;

                for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                    loadingText.innerText = `Memproses halaman ${pageNum} dari ${totalPages}...`;
                    
                    const page = await pdf.getPage(pageNum);
                    
                    // Gunakan viewport asli halaman tersebut agar tidak meleset/terpotong
                    const viewport = page.getViewport({ scale: 1.5 });
                    
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;

                    await page.render({
                        canvasContext: ctx,
                        viewport: viewport
                    }).promise;

                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page';
                    pageDiv.appendChild(canvas);
                    
                    bookEl.appendChild(pageDiv);
                }

                loadingText.innerText = "Membentuk buku 3D...";
                
                // Set ukuran ke FIXED agar stabil, responsivitas diatur oleh fungsi CSS dibawah
                pageFlipInstance = new window.St.PageFlip(bookEl, {
                    width: reqWidth,       
                    height: reqHeight,     
                    size: "fixed",         
                    showCover: true,       
                    mobileScrollSupport: false,
                    usePortrait: true      
                });

                pageFlipInstance.loadFromHTML(document.querySelectorAll('.page'));

                loader.style.display = 'none';
                pageCounter.innerText = `Halaman 1 dari ${totalPages}`;

                // Panggil fungsi penyesuai ukuran layar
                scaleBook();

                pageFlipInstance.on('flip', (e) => {
                    let currentPage = e.data + 1;
                    if (currentPage === 1) {
                        pageCounter.innerText = `Halaman 1 dari ${totalPages}`;
                    } else if (currentPage === totalPages) {
                        pageCounter.innerText = `Halaman ${totalPages} dari ${totalPages}`;
                    } else {
                        pageCounter.innerText = `Halaman ${currentPage}-${currentPage+1} dari ${totalPages}`;
                    }
                });
                
                // Jika perangkat mengubah orientasi layar (seperti HP dimiringkan)
                pageFlipInstance.on('changeOrientation', () => {
                    scaleBook();
                });

            } catch (error) {
                console.error("Error rendering PDF: ", error);
                loadingText.innerText = "Gagal memuat dokumen!";
                document.querySelector('.spinner').style.display = 'none';
                
                const errorMsg = document.createElement('p');
                errorMsg.className = 'text-red-400 text-sm mt-4 text-center max-w-md';
                errorMsg.innerText = `Pastikan file "${url}" ada di repository. Detail Error: ${error.message}`;
                loader.appendChild(errorMsg);
            }
        }

        // ==============================================================
        // FUNGSI UNTUK MENYESUAIKAN BUKU DENGAN LAYAR (ANTI-TERPOTONG)
        // ==============================================================
        function scaleBook() {
            if (!pageFlipInstance) return;
            
            const wrapper = document.getElementById('book-wrapper');
            
            // Cek apakah buku sedang menampilkan 1 halaman (Portrait/HP) atau 2 halaman (Landscape/PC)
            const isPortrait = pageFlipInstance.getOrientation() === 'portrait';
            const currentBookWidth = isPortrait ? reqWidth : reqWidth * 2;
            
            // Sisakan ruang 40px untuk jarak batas atas/bawah/kiri/kanan
            const availableWidth = wrapper.clientWidth - 40;
            const availableHeight = wrapper.clientHeight - 40;
            
            const scaleWidth = availableWidth / currentBookWidth;
            const scaleHeight = availableHeight / reqHeight;
            
            // Ambil skala terkecil agar buku masuk sepenuhnya ke dalam layar
            const scale = Math.min(scaleWidth, scaleHeight, 1); 
            
            bookEl.style.transform = `scale(${scale})`;
            bookEl.style.transformOrigin = 'center center';
        }

        // Update skala saat ukuran browser diubah
        window.addEventListener('resize', scaleBook);

        // Kontrol Tombol
        prevBtn.addEventListener('click', () => {
            if(pageFlipInstance) pageFlipInstance.flipPrev();
        });
        
        nextBtn.addEventListener('click', () => {
            if(pageFlipInstance) pageFlipInstance.flipNext();
        });

        document.addEventListener('keydown', (e) => {
            if (!pageFlipInstance) return;
            if (e.keyCode === 37) pageFlipInstance.flipPrev(); 
            if (e.keyCode === 39) pageFlipInstance.flipNext(); 
        });

    </script>
</body>
</html>
