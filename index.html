<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsip Digital KPU - Flipbook Viewer</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- jQuery (Dibutuhkan untuk Turn.js) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- Turn.js untuk efek membalik halaman -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    
    <!-- PDF.js untuk membaca file PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    
    <style>
        body {
            background-color: #e5e7eb;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        #book-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 70px);
            width: 100%;
            overflow: hidden;
            perspective: 2000px;
        }

        #flipbook {
            transition: transform 0.3s ease;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        #flipbook .page {
            background-color: white;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        /* Menggunakan object-fit contain agar gambar selalu proporsional dan tidak gepeng */
        #flipbook canvas {
            width: 100%;
            height: 100%;
            object-fit: contain; 
        }

        #loader {
            position: fixed;
            top: 70px; left: 0; right: 0; bottom: 0;
            background: rgba(229, 231, 235, 0.95);
            z-index: 50;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .spinner {
            border: 4px solid #d1d5db;
            border-top: 4px solid #ea580c;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- Header / Navbar -->
    <header class="bg-white shadow z-10 p-4 flex justify-between items-center h-[70px] border-b-4 border-orange-600">
        <div class="flex items-center gap-3">
            <h1 class="text-xl font-bold text-gray-800">Arsip Digital KPU Provinsi Sulawesi Tengah</h1>
        </div>
        
        <div class="flex gap-2">
            <span id="page-counter" class="text-gray-500 font-medium px-4 py-2">Loading...</span>
            <button id="prev-btn" class="bg-gray-100 hover:bg-gray-200 text-gray-800 border border-gray-300 px-4 py-2 rounded-md font-medium transition-colors disabled:opacity-50">← Sebelumnya</button>
            <button id="next-btn" class="bg-gray-100 hover:bg-gray-200 text-gray-800 border border-gray-300 px-4 py-2 rounded-md font-medium transition-colors disabled:opacity-50">Selanjutnya →</button>
        </div>
    </header>

    <!-- Area Buku -->
    <main class="flex-1 relative bg-gray-200">
        <div id="loader">
            <div class="spinner mb-4"></div>
            <p class="text-xl font-bold text-gray-800" id="loading-text">Membaca Ukuran Asli Dokumen...</p>
            <p class="text-sm text-gray-600 mt-2">Memproses halaman beresolusi tinggi</p>
        </div>

        <div id="book-wrapper">
            <div id="flipbook" style="display: none;"></div>
        </div>
    </main>

    <script>
        // ==========================================
        // SETTING FILE PDF (Sesuaikan dengan nama file di Github Anda)
        // ==========================================
        const PDF_URL = './e-magazine.pdf'; 
        
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let flipbookInitialized = false;
        let totalPages = 0;
        
        // Variabel dinamis untuk menyimpan ukuran asli PDF
        let PAGE_WIDTH = 0;
        let PAGE_HEIGHT = 0;
        let BOOK_WIDTH = 0;

        const loader = document.getElementById('loader');
        const flipbookEl = $('#flipbook');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const loadingText = document.getElementById('loading-text');
        const pageCounter = document.getElementById('page-counter');

        window.onload = function() {
            loadAndRenderPDF(PDF_URL);
        };

        // Kontrol Tombol
        prevBtn.addEventListener('click', () => flipbookEl.turn('previous'));
        nextBtn.addEventListener('click', () => flipbookEl.turn('next'));

        // Kontrol Keyboard
        $(window).on('keydown', function(e) {
            if (e.keyCode === 37) flipbookEl.turn('previous'); 
            if (e.keyCode === 39) flipbookEl.turn('next');     
        });

        async function loadAndRenderPDF(url) {
            try {
                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;
                totalPages = pdf.numPages;
                
                // 1. DETEKSI UKURAN ASLI DARI HALAMAN 1
                const firstPage = await pdf.getPage(1);
                // Kita gunakan scale 1.5 atau 2.0 agar resolusinya tajam saat dizoom
                const baseViewport = firstPage.getViewport({ scale: 1.5 }); 
                
                // Simpan ukuran asli secara dinamis
                PAGE_WIDTH = baseViewport.width;
                PAGE_HEIGHT = baseViewport.height;
                BOOK_WIDTH = PAGE_WIDTH * 2; // Karena buku terbuka menampilkan 2 halaman berdampingan
                
                flipbookEl.css({ width: BOOK_WIDTH, height: PAGE_HEIGHT });
                flipbookEl.show();

                // 2. RENDER SEMUA HALAMAN
                for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                    loadingText.innerText = `Merender halaman ${pageNum} dari ${totalPages}...`;
                    
                    const page = await pdf.getPage(pageNum);
                    const viewport = page.getViewport({ scale: 1.5 });
                    
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;

                    const renderContext = {
                        canvasContext: ctx,
                        viewport: viewport
                    };
                    await page.render(renderContext).promise;

                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page';
                    pageDiv.appendChild(canvas);
                    
                    flipbookEl.append(pageDiv);
                }

                // 3. JALANKAN EFEK FLIPBOOK
                loadingText.innerText = "Menyelesaikan buku...";
                setTimeout(() => {
                    flipbookEl.turn({
                        width: BOOK_WIDTH,
                        height: PAGE_HEIGHT,
                        autoCenter: true,
                        duration: 800,
                        gradients: true,
                        elevation: 50,
                        when: {
                            turning: function(e, page, view) {
                                updatePageCounter(page);
                            }
                        }
                    });
                    
                    flipbookInitialized = true;
                    loader.style.display = 'none';
                    updatePageCounter(1);
                    scaleBook(); 
                }, 200);

            } catch (error) {
                console.error("Error rendering PDF: ", error);
                loadingText.innerText = "Gagal memuat dokumen!";
                document.querySelector('.spinner').style.display = 'none';
                
                const errorMsg = document.createElement('p');
                errorMsg.className = 'text-red-500 text-sm mt-4 text-center max-w-md';
                errorMsg.innerText = `Pastikan file "${url}" ada. Detail Error: ${error.message}`;
                loader.appendChild(errorMsg);
            }
        }

        function updatePageCounter(currentPage) {
            let view = flipbookEl.turn('view');
            let text = "";
            if (view[0] === 0) text = `Halaman ${view[1]} dari ${totalPages}`; 
            else if (view[1] === 0) text = `Halaman ${view[0]} dari ${totalPages}`; 
            else text = `Halaman ${view[0]}-${view[1]} dari ${totalPages}`; 
            
            pageCounter.innerText = text;
        }

        // Fungsi agar buku menyesuaikan ukuran layar monitor (Responsive)
        function scaleBook() {
            if (!flipbookInitialized || BOOK_WIDTH === 0) return;
            
            const wrapper = document.getElementById('book-wrapper');
            const availableWidth = wrapper.clientWidth - 40;
            const availableHeight = wrapper.clientHeight - 40;
            
            const scaleWidth = availableWidth / BOOK_WIDTH;
            const scaleHeight = availableHeight / PAGE_HEIGHT;
            
            const scale = Math.min(scaleWidth, scaleHeight, 1); 
            
            flipbookEl.css('transform', `scale(${scale})`);
            flipbookEl.css('transform-origin', 'center center');
        }

        $(window).resize(scaleBook);

    </script>
</body>
</html>
